<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Big Calendar Demo -- Tara's Schedule</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/react-big-calendar@1.13.4/lib/css/react-big-calendar.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #0b8043;
      color: white;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 500;
      flex-shrink: 0;
    }
    #root {
      flex: 1;
      padding: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .rbc-calendar {
      flex: 1;
    }

    /* Category colors via event className */
    .cat-work .rbc-event-content       { background: #1a73e8; }
    .rbc-event.cat-work                { background: #1a73e8; border-color: #1558b0; }
    .rbc-event.cat-commute             { background: #f4b400; border-color: #c6920a; color: #222; }
    .rbc-event.cat-exercise            { background: #0f9d58; border-color: #0b7a44; }
    .rbc-event.cat-sleep               { background: #4a4a6a; border-color: #333355; }
    .rbc-event.cat-selfcare            { background: #ab47bc; border-color: #8e24aa; }
    .rbc-event.cat-mealprep            { background: #ff7043; border-color: #e64a19; }
    .rbc-event.cat-other               { background: #78909c; border-color: #546e7a; }
  </style>
</head>
<body>
  <header>React Big Calendar Demo -- Tara's Schedule</header>
  <div id="root"></div>

  <!-- React + Babel for in-browser JSX (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-big-calendar@1.13.4/lib/umd/react-big-calendar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-big-calendar@1.13.4/lib/addons/dragAndDrop/index.js"></script>

  <script type="text/babel">
    const { Calendar, dateFnsLocalizer } = ReactBigCalendar;
    const { format, parse, startOfWeek, getDay } = dateFns;

    const localizer = dateFnsLocalizer({
      format,
      parse,
      startOfWeek: () => startOfWeek(new Date(), { weekStartsOn: 0 }), // Sunday
      getDay,
      locales: {},
    });

    const today = new Date();
    const d = (h, m) => {
      const dt = new Date(today);
      dt.setHours(h, m, 0, 0);
      return dt;
    };

    const events = [
      { title: 'Sleep',             start: d(0, 0),  end: d(4, 30),  category: 'sleep' },
      { title: 'Morning Routine',   start: d(4, 30), end: d(7, 0),   category: 'selfcare' },
      { title: 'Commute',           start: d(7, 0),  end: d(8, 0),   category: 'commute' },
      { title: 'Work',              start: d(8, 0),  end: d(15, 0),  category: 'work' },
      { title: 'Commute Home',      start: d(15, 0), end: d(16, 0),  category: 'commute' },
      { title: 'Exercise',          start: d(16, 0), end: d(17, 0),  category: 'exercise' },
      { title: 'Dinner / Meal Prep',start: d(17, 0), end: d(18, 30), category: 'mealprep' },
      { title: 'Wind Down',         start: d(21, 0), end: d(22, 30), category: 'selfcare' },
      { title: 'Sleep',             start: d(22, 30),end: d(23, 59), category: 'sleep' },
    ];

    function App() {
      const [selectedEvent, setSelectedEvent] = React.useState(null);

      const eventPropGetter = (event) => ({
        className: `cat-${event.category}`,
      });

      return (
        <Calendar
          localizer={localizer}
          events={events}
          defaultView="day"
          views={['day', 'week']}
          defaultDate={today}
          step={30}
          timeslots={2}
          showMultiDayTimes
          eventPropGetter={eventPropGetter}
          onSelectEvent={(e) => {
            const start = e.start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const end   = e.end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            alert(`${e.title}\n${start} - ${end}`);
          }}
          style={{ height: '100%' }}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
