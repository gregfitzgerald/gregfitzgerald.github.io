<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FullCalendar Demo -- Tara's Schedule</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 12px 16px;
      font-size: 18px;
      font-weight: 500;
      flex-shrink: 0;
    }
    #calendar-container {
      flex: 1;
      overflow: hidden;
      padding: 8px;
    }
    #calendar {
      height: 100%;
    }

    /* Style overrides to feel more like Tara's app */
    .fc-timegrid-slot { height: 30px !important; }
    .fc-event { border-radius: 4px; font-size: 12px; }
    .fc-toolbar-title { font-size: 16px !important; }

    /* Category colors */
    .cat-work       { background: #1a73e8 !important; border-color: #1558b0 !important; }
    .cat-commute    { background: #f4b400 !important; border-color: #c6920a !important; color: #222 !important; }
    .cat-exercise   { background: #0f9d58 !important; border-color: #0b7a44 !important; }
    .cat-sleep      { background: #4a4a6a !important; border-color: #333355 !important; }
    .cat-selfcare   { background: #ab47bc !important; border-color: #8e24aa !important; }
    .cat-mealprep   { background: #ff7043 !important; border-color: #e64a19 !important; }
    .cat-other      { background: #78909c !important; border-color: #546e7a !important; }
  </style>
</head>
<body>
  <header>FullCalendar Demo -- Tara's Schedule</header>
  <div id="calendar-container">
    <div id="calendar"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script>
    // Sample events based on Tara's actual schedule (Week 2, a typical workday)
    const today = new Date();
    const d = (h, m) => {
      const dt = new Date(today);
      dt.setHours(h, m, 0, 0);
      return dt.toISOString();
    };

    const events = [
      { title: 'Sleep',          start: d(0, 0),   end: d(4, 30),  classNames: ['cat-sleep'] },
      { title: 'Morning Routine',start: d(4, 30),  end: d(7, 0),   classNames: ['cat-selfcare'] },
      { title: 'Commute',        start: d(7, 0),   end: d(8, 0),   classNames: ['cat-commute'] },
      { title: 'Work',           start: d(8, 0),   end: d(15, 0),  classNames: ['cat-work'] },
      { title: 'Commute Home',   start: d(15, 0),  end: d(16, 0),  classNames: ['cat-commute'] },
      { title: 'Exercise',       start: d(16, 0),  end: d(17, 0),  classNames: ['cat-exercise'] },
      { title: 'Dinner / Meal Prep', start: d(17, 0), end: d(18, 30), classNames: ['cat-mealprep'] },
      { title: 'Wind Down',      start: d(21, 0),  end: d(22, 30), classNames: ['cat-selfcare'] },
      { title: 'Sleep',          start: d(22, 30), end: d(23, 59), classNames: ['cat-sleep'] },
    ];

    const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
      initialView: 'timeGridDay',
      initialDate: today,
      headerToolbar: {
        left: 'prev,next',
        center: 'title',
        right: 'timeGridDay,timeGridWeek'
      },
      slotMinTime: '00:00:00',
      slotMaxTime: '24:00:00',
      slotDuration: '00:30:00',
      allDaySlot: false,
      nowIndicator: true,
      height: '100%',
      events: events,
      eventClick: function(info) {
        alert('Block: ' + info.event.title + '\n' + info.event.startStr.slice(11,16) + ' - ' + info.event.endStr.slice(11,16));
      },
      // Touch-friendly settings
      longPressDelay: 500,
      eventLongPressDelay: 500,
      selectLongPressDelay: 500,
    });

    calendar.render();
  </script>
</body>
</html>
